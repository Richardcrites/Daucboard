<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAUC ICU Board - TV DENSITY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f3f8; --surface: #ffffff; --border: #d4dce8;
    --text: #1a2336; --muted: #7a8fa8; --icu-accent: #2563eb;
    --surg-accent: #7c3aed; --cpr: #16a34a; --dnr: #dc2626;
    --am-color: #0891b2; --pm-color: #7c3aed;
    --shadow: 0 1px 2px rgba(0,0,0,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* TV OPTIMIZATION: Removes outside padding to use full screen width */
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'DM Mono', monospace; 
    padding: 10px 15px; 
    overflow-x: hidden;
  }

  .header { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 15px; 
    padding-bottom: 10px; 
    border-bottom: 2px solid var(--border); 
  }
  
  .board-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }

  /* DENSITY CONTROLS */
  .board-table { width: 100%; border-collapse: separate; border-spacing: 0 2px; }
  .board-table th { font-size: 8px; color: var(--muted); text-transform: uppercase; padding: 2px 8px; text-align: left; }
  
  /* Tightened row height */
  .board-table tr { background: var(--surface); box-shadow: var(--shadow); }
  .board-table td { padding: 6px 8px; font-size: 11px; vertical-align: middle; line-height: 1.1; }

  /* Accent Bars */
  .icu td:first-child { border-left: 4px solid var(--icu-accent); border-radius: 4px 0 0 4px; }
  .surg td:first-child { border-left: 4px solid var(--surg-accent); border-radius: 4px 0 0 4px; }

  /* Column Width Management */
  .col-patient { width: 12%; }
  .col-rx { width: 18%; max-width: 200px; font-size: 10px !important; color: #444; overflow: hidden; text-overflow: ellipsis; }
  .col-reason { width: 12%; font-size: 10px !important; }
  .col-alert { width: 15%; }

  .patient-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; }
  .patient-owner { font-size: 8px; color: var(--muted); text-transform: uppercase; }

  .status-pill { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
  .cpr { background: #f0fdf4; color: var(--cpr); border: 1px solid #bbf7d0; }
  .dnr { background: #fef2f2; color: var(--dnr); border: 1px solid #fecaca; }

  /* Section Dividers */
  .section-head { font-size: 10px; font-weight: 800; margin: 15px 0 5px 0; letter-spacing: 1px; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 20px; border-radius: 8px; width: 600px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  input, select, textarea { padding: 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; width: 100%; }

  /* Hide buttons during casting */
  @media print { .btn, .edit-toggle { display: none; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <div style="font-size:9px; color:var(--muted); text-transform:uppercase;">Dallas Animal Urgent Care</div>
    <div class="board-title">ICU Board</div>
  </div>
  <div style="display:flex; align-items:center; gap:20px;">
    <div class="edit-toggle" id="editToggle" onclick="toggleEditMode()" style="cursor:pointer; font-size:10px; border:1px solid var(--border); padding:5px 10px; border-radius:4px;">Admin Mode</div>
    <div id="clock" style="font-size:20px; font-weight:600;">--:--</div>
  </div>
</div>

<div class="section-head" style="color:var(--icu-accent)">✚ ICU / HOSPITAL</div>
<table class="board-table">
  <thead>
    <tr>
      <th class="col-patient">Patient</th><th>Wt</th><th>Sp</th><th>Loc</th><th>DVM</th><th>Tech</th>
      <th class="col-reason">Reason</th><th class="col-rx">Rx/Instructions</th><th>Status</th><th class="col-alert">Alerts</th>
    </tr>
  </thead>
  <tbody id="icu-body"></tbody>
</table>

<div class="section-head" style="color:var(--surg-accent)">✂ SURGERY</div>
<table class="board-table">
  <thead>
    <tr>
      <th class="col-patient">Patient</th><th>Wt</th><th>Sp</th><th>Loc</th><th>DVM</th><th>Tech</th>
      <th class="col-reason">Reason</th><th class="col-rx">Rx/Instructions</th><th>Status</th><th class="col-alert">Alerts</th>
    </tr>
  </thead>
  <tbody id="surg-body"></tbody>
</table>

<button id="addBtn" style="display:none; margin: 15px 0;" onclick="openModal()">+ Add Patient</button>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle" style="margin-bottom:15px; font-family:Syne;">Patient Record</h2>
    <div class="form-grid">
      <input id="f-name" placeholder="Name">
      <input id="f-owner" placeholder="Owner">
      <input id="f-weight" placeholder="Weight">
      <select id="f-species"><option value="K9">K9</option><option value="Fel">Fel</option></select>
      <input id="f-location" placeholder="Location">
      <input id="f-dvm-am" placeholder="DVM AM"><input id="f-dvm-pm" placeholder="DVM PM">
      <input id="f-tech" placeholder="Tech">
      <input id="f-reason" placeholder="Reason">
      <select id="f-section"><option value="icu">ICU</option><option value="surg">Surgery</option></select>
      <select id="f-status"><option value="CPR">CPR</option><option value="DNR">DNR</option></select>
      <textarea id="f-rx" placeholder="Rx" style="grid-column: 1/-1"></textarea>
      <textarea id="f-alert" placeholder="Alerts" style="grid-column: 1/-1"></textarea>
    </div>
    <div style="margin-top:15px; display:flex; justify-content:space-between;">
      <button onclick="closeModal()">Cancel</button>
      <button id="delBtn" style="background:#fee2e2; color:#991b1b; display:none" onclick="deletePatient()">Delete</button>
      <button style="background:var(--icu-accent); color:white; padding:8px 15px; border-radius:4px; border:none;" onclick="savePatient()">Save</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyComnKEUpRWlBX9YXNnb8fYwBVdNbpTZfE",
  authDomain: "daucboard.firebaseapp.com",
  databaseURL: "https://daucboard-default-rtdb.firebaseio.com/",
  projectId: "daucboard",
  storageBucket: "daucboard.firebasestorage.app",
  messagingSenderId: "351146913442",
  appId: "1:351146913442:web:7d4d1185534fd71eed71fb",
  measurementId: "G-1F1GD228LV"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let editMode = false, currentId = null;

db.ref('patients').on('value', (snapshot) => {
  const data = snapshot.val();
  renderAll(data);
});

function renderAll(data) {
  const icu = document.getElementById('icu-body');
  const surg = document.getElementById('surg-body');
  icu.innerHTML = ''; surg.innerHTML = '';
  if(!data) return;

  Object.keys(data).forEach(id => {
    const p = data[id];
    const tr = document.createElement('tr');
    tr.className = p.section;
    if(editMode) tr.onclick = () => editPatient(id, p);
    
    tr.innerHTML = `
      <td class="col-patient"><div class="patient-name">${p.name}</div><div class="patient-owner">${p.owner}</div></td>
      <td>${p.weight}</td>
      <td>${p.species}</td>
      <td>${p.location}</td>
      <td>${p.dvmAm || ''}/${p.dvmPm || ''}</td>
      <td>${p.tech}</td>
      <td class="col-reason">${p.reason || '--'}</td>
      <td class="col-rx">${p.rx || '--'}</td>
      <td><span class="status-pill ${p.status.toLowerCase()}">${p.status}</span></td>
      <td class="col-alert">${p.alert ? `<div style="background:var(--alert-bg); border:1px solid #fde68a; padding:2px; border-radius:2px; font-size:9px;">${p.alert}</div>` : '--'}</td>
    `;
    if(p.section === 'surg') surg.appendChild(tr); else icu.appendChild(tr);
  });
}

function savePatient() {
  const p = {
    name: document.getElementById('f-name').value,
    owner: document.getElementById('f-owner').value,
    weight: document.getElementById('f-weight').value,
    species: document.getElementById('f-species').value,
    location: document.getElementById('f-location').value,
    dvmAm: document.getElementById('f-dvm-am').value,
    dvmPm: document.getElementById('f-dvm-pm').value,
    tech: document.getElementById('f-tech').value,
    reason: document.getElementById('f-reason').value,
    section: document.getElementById('f-section').value,
    status: document.getElementById('f-status').value,
    rx: document.getElementById('f-rx').value,
    alert: document.getElementById('f-alert').value
  };
  if(currentId) db.ref('patients/'+currentId).set(p); else db.ref('patients').push(p);
  closeModal();
}

function deletePatient() {
  if(confirm("Discharge patient?")) {
    db.ref('patients/'+currentId).remove();
    closeModal();
  }
}

function editPatient(id, p) {
  currentId = id;
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-owner').value = p.owner;
  document.getElementById('f-weight').value = p.weight;
  document.getElementById('f-species').value = p.species;
  document.getElementById('f-location').value = p.location;
  document.getElementById('f-dvm-am').value = p.dvmAm || '';
  document.getElementById('f-dvm-pm').value = p.dvmPm || '';
  document.getElementById('f-tech').value = p.tech;
  document.getElementById('f-reason').value = p.reason || '';
  document.getElementById('f-section').value = p.section;
  document.getElementById('f-status').value = p.status;
  document.getElementById('f-rx').value = p.rx;
  document.getElementById('f-alert').value = p.alert;
  document.getElementById('delBtn').style.display = 'inline-block';
  openModal();
}

function toggleEditMode() {
  editMode = !editMode;
  document.getElementById('editToggle').classList.toggle('active', editMode);
  document.getElementById('addBtn').style.display = editMode ? 'block' : 'none';
}

function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { 
  document.getElementById('modalOverlay').classList.remove('open');
  currentId = null;
  document.getElementById('delBtn').style.display = 'none';
  ['f-name','f-owner','f-weight','f-location','f-dvm-am','f-dvm-pm','f-tech','f-reason','f-rx','f-alert'].forEach(i => document.getElementById(i).value = '');
}

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}, 1000);
</script>
</body>
</html>
